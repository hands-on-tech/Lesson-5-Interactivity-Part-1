<!DOCTYPE html>
<html lang="en-GB">
<head>
    <meta charset="UTF-8">
    <title>Interactivity Lab</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>Interactivity Playground</h1>
        <button id="theme-btn">Switch Theme</button>
    </header>

    <main id="card">
        <section>
            <button id="toggle-btn">Show Info</button>
            <div id="extra-info" style="display: none;">
                <p>You used JavaScript to show this text!</p>
            </div>
        </section>

        <section>
            <h3>My Skills</h3>
            <button id="glow-btn">Highlight Skills</button>
            <ul>
                <li>Web Design</li>
                <li>Logic Building</li>
                <li>Problem Solving</li>
            </ul>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
